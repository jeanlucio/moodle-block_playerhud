name: Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        moodle-branch: ['MOODLE_405_STABLE', 'master']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, mysqli, gd, xml, dom, json, zip, bcmath, intl
          ini-values: max_execution_time=600, memory_limit=1G

      - name: Install Moodle Plugin CI (Direct Install)
        run: |
          # Baixamos a ferramenta direto da fonte, sem passar pelo mercado (Packagist)
          git clone --depth 1 https://github.com/moodlehq/moodle-plugin-ci.git ~/moodle-plugin-ci
          cd ~/moodle-plugin-ci
          composer install --no-dev --no-interaction --ignore-platform-reqs
          echo "$HOME/moodle-plugin-ci/bin" >> $GITHUB_PATH

      - name: Initialize CI
        run: |
          moodle-plugin-ci install --plugin . --moodle ${{ matrix.moodle-branch }} --branch ${{ github.ref_name }}

      - name: Run PHPCS
        run: moodle-plugin-ci phpcs

      - name: Run PHPUnit
        run: moodle-plugin-ci phpunit
